name: local_fixture_engine_baseline
kind: single_host          # reuse the only v0-runnable kind — no gate change
runnable: true
description: >-
  Engine baseline. Deep-crawls a deterministic in-process fixture server over
  loopback so results are reproducible: page count, depth distribution, and
  extraction totals are fixed by the corpus; only throughput varies. Measures
  wxpath's own cost (scheduling + HTML parse + XPath eval), not the network.
seeds:
  type: fixture            # generated by benchmarks/server.py; resolved at run time
  page_count: 512          # BFS 4-ary tree -> 512 pages, tree height 5
  fan_out: 4
  filler_bytes: 2048       # per-page filler so byte throughput is non-trivial
path_expr: "///url(//@href)"   # deep crawl: follow every <a href> up to max_depth
max_depth: 8               # >= corpus tree height, so the whole tree is fetched
limits:
  max_urls: 2000           # comfortably above expected 511 yielded values
  wall_clock_seconds: 60
settings_overrides:
  # Saturate the scheduler and strip politeness sleeps so we measure compute,
  # not artificial delays. (respect_robots is honored by the driver explicitly.)
  http.client.crawler.concurrency: 32
  http.client.crawler.per_host: 32
  http.client.crawler.respect_robots: false
  http.client.crawler.timeout: 15
  http.client.crawler.auto_throttle_start_delay: 0.0
  http.client.crawler.auto_throttle_max_delay: 0.0
  http.client.cache.enabled: false
tags:
  - engine-baseline
  - reproducible
  - local
