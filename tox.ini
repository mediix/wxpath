# Tox: run tests and lint across multiple Python versions.
# Usage: tox          (all envs) | tox -e py311 (one env) | tox -e lint
[tox]
envlist = py{310,311,312,313,314}{,-tui}
isolated_build = true

[testenv]
description = run tests
extras =
    test
    tui: tui
commands =
    tui: python -m pytest tests/tui
    !tui: python -m pytest

[testenv:lint]
description = run ruff
extras = dev
commands = ruff check .
